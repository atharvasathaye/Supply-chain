name: Update Economic Data

on:
  schedule:
    # Run at 00:00 on the 5th of every month (giving APIs time to publish prior month data)
    - cron: '0 0 5 * *'
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests openpyxl

      - name: Run Data Pipeline
        run: python data_pipeline.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add merged_data_for_bi.csv cpi_data.csv gscpi_data.csv
          
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update macroeconomic data" && git push)
