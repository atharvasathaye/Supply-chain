name: Monthly data refresh

on:
  schedule:
    # Runs at 06:00 UTC on the 5th of every month
    - cron: "0 6 5 * *"
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data pipeline
        run: python data_pipeline.py

      - name: Run statistical analysis & generate forecast
        run: python statistical_analysis.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cpi_data.csv gscpi_data.csv merged_data_for_bi.csv forecast_data.csv
          git diff --cached --quiet || git commit -m "chore: monthly data refresh $(date +'%Y-%m-%d')"
          git push
